# 3. ЗАПУСК GRAFANA
- name: Run Grafana Container
  shell: |
    docker rm -f grafana || true
    docker run -d --name grafana --restart always -p 3000:3000 \
    -e "GF_SERVER_DOMAIN={{ alb_public_ip }}" \
    -e "GF_SERVER_ROOT_URL=http://{{ alb_public_ip }}/grafana/" \
    -e "GF_SERVER_SERVE_FROM_SUB_PATH=true" \
    -e "GF_SECURITY_ADMIN_PASSWORD=admin" \
    grafana/grafana
  when: inventory_hostname == 'grafana'

- name: Wait for Grafana API
  uri:
    url: http://localhost:3000/grafana/api/health
    status_code: 200
  register: g_status
  until: g_status.status == 200
  retries: 20
  delay: 5
  when: inventory_hostname == 'grafana'

# 4. НАСТРОЙКА DATA SOURCES В GRAFANA
- name: Add Prometheus Data Source
  uri:
    url: http://localhost:3000/grafana/api/datasources
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body:
      name: "Prometheus"
      type: "prometheus"
      url: "http://{{ hostvars['prometheus']['ansible_host'] }}:9090"
      access: "proxy"
      isDefault: true
    status_code: [200, 409]
  when: inventory_hostname == 'grafana'

- name: Add Elasticsearch Data Sources (Nginx & Docker)
  uri:
    url: http://localhost:3000/grafana/api/datasources
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ item.name }}"
      type: "elasticsearch"
      url: "http://{{ hostvars['elasticsearch']['ansible_host'] }}:9200"
      access: "proxy"
      database: "{{ item.index }}"
      jsonData:
        timeField: "@timestamp"
        esVersion: "7.17.10"
        interval: "" 
        logMessageField: "{{ item.msg_field }}"
        logLevelField: "{{ item.level_field }}"
    status_code: [200, 409]
  loop:
    - { name: "ES-Nginx-Logs", index: "nginx-prod-*", msg_field: "uri", level_field: "http_code" }
    - { name: "ES-Docker-Infra", index: "docker-infra-*", msg_field: "message", level_field: "level" }
  when: inventory_hostname == 'grafana'

- name: Add PostgreSQL Archive Data Source
  uri:
    url: http://localhost:3000/grafana/api/datasources
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body:
      name: "PostgreSQL-Prom-Archive"
      type: "postgres"
      url: "{{ db_host }}:6432"
      access: "proxy"
      database: "prometheus"
      user: "prom_user"
      jsonData:
        database: "prometheus"
        sslmode: "require"
        postgresVersion: 1500
        timescaledb: true
      secureJsonData:
        password: "{{ db_password }}"
    status_code: [200, 409]
  when: inventory_hostname == 'grafana'

# 5. ИМПОРТ ДАШБОРДА
- name: Import Node Exporter Dashboard
  uri:
    url: http://localhost:3000/grafana/api/dashboards/import
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body:
      dashboard: "{{ lookup('file', 'node_exporter.json') | from_json }}"
      inputs:
        - name: "DS_PROMETHEUS"
          pluginId: "prometheus"
          value: "Prometheus"
      overwrite: true
    status_code: [200, 201, 409]
  when: inventory_hostname == 'grafana'

- name: Import Custom Nginx JSON Dashboard
  uri:
    url: "http://localhost:3000/grafana/api/dashboards/import"
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body: "{{ lookup('file', 'nginx_json_dashboard.json') | from_json }}"
    status_code: [200, 201]
  when: inventory_hostname == 'grafana'