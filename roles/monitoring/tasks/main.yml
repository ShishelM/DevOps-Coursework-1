---
# 1. СОЗДАНИЕ КОНФИГУРАЦИИ PROMETHEUS
- name: Create Prometheus Config
  copy:
    content: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: 'web_servers'
          static_configs:
            - targets: {{ groups['webservers'] | map('regex_replace', '$', ':9100') | list | to_yaml }}
    dest: /tmp/prometheus.yml

