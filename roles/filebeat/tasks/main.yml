- name: Create Filebeat Config
  copy:
    content: |
      filebeat.inputs:
      # Логи Nginx
      - type: log
        enabled: true
        paths:
          - /var/log/nginx/access.json.log
        json.keys_under_root: true
        fields:
          service_type: nginx-prod  # Метка для индекса
        fields_under_root: true

      # Логи Контейнеров (Elastic, Kibana, Grafana, Prometheus)
      - type: container
        enabled: true
        paths:
          - /var/lib/docker/containers/*/*.log
        fields:
          service_type: docker-infra # Метка для индекса
        fields_under_root: true

      processors:
        - add_docker_metadata: ~
        - decode_json_fields:
            fields: ["message"]
            target: ""
            overwrite_keys: true

      # Настройка динамических индексов
      output.elasticsearch:
        hosts: ["http://{{ hostvars['elasticsearch']['ansible_host'] }}:9200"]
        indices:
          - index: "nginx-prod-%{[agent.version]}-%{+yyyy.MM.dd}"
            when.contains:
              service_type: "nginx-prod"
          - index: "docker-infra-%{[agent.version]}-%{+yyyy.MM.dd}"
            when.contains:
              service_type: "docker-infra"
      
      # Отключаем дефолтный шаблон, чтобы он не мешал кастомным индексам
      setup.template.enabled: false
      setup.ilm.enabled: false
    dest: /etc/filebeat.yml

- name: Run Filebeat Container
  shell: |
    docker rm -f filebeat || true
    docker run -d --name filebeat --restart always --user root \
    --hostname "{{ inventory_hostname }}" \
    -v /etc/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro \
    -v /var/log/nginx:/var/log/nginx:ro \
    -v /var/lib/docker/containers:/var/lib/docker/containers:ro \
    -v /var/run/docker.sock:/var/run/docker.sock:ro \
    docker.elastic.co/beats/filebeat:7.17.10

