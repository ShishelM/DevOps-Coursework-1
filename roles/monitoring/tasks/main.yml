# 2. ЗАПУСК КОНТЕЙНЕРОВ (PROMETHEUS И АДАПТЕР (отключен))
- name: Run Prometheus Container
  shell: "docker rm -f prometheus || true && docker run -d --name prometheus --restart always -p 9090:9090 -v /tmp/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus"
  when: inventory_hostname == 'prometheus'

