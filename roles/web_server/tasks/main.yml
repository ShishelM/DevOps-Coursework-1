---
- name: Install Nginx and Node Exporter
  apt:
    name: [nginx, prometheus-node-exporter]
    state: present
    update_cache: yes

- name: Create Identical Static Site
  copy:
    content: "<h1>Welcome to Coursework Web Server</h1><p>Node: {{ ansible_hostname }}</p>"
    dest: /var/www/html/index.html
    mode: '0644'

- name: Configure Nginx JSON logging
  copy:
    content: |
      log_format json_analytics escape=json '{"time_local": "$time_local", "client_ip": "$remote_addr", "proxy_ip": "$http_x_forwarded_for", "server_ip": "$server_addr", "backend_ip": "$upstream_addr", "http_code": "$status", "request_time": "$request_time", "uri": "$uri"}';
    dest: /etc/nginx/conf.d/logging.conf
  notify: restart nginx

- name: Configure Nginx Site with Proxy for Grafana and Kibana
  copy:
    content: |
      server {
          listen 80;
          
          # Основной лог в формате JSON
          access_log /var/log/nginx/access.json.log json_analytics;

          # Основной сайт
          location / {
              root /var/www/html;
              index index.html;
          }

          # Прокси для Grafana
          location /grafana/ {
            proxy_pass http://{{ grafana_internal_ip }}:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

          # Прокси для Kibana
          location /kibana/ {
              proxy_pass http://{{ kibana_internal_ip }}:5601;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              
              # Настройки для стабильной работы Kibana (WebSocket/Long polling)
              proxy_http_version 1.1;
              proxy_set_header Connection "Keep-Alive";
              proxy_set_header Proxy-Connection "Keep-Alive";
          }
      }
    dest: /etc/nginx/sites-available/default
  notify: restart nginx